<svg width="100%" viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 15px; font-weight: 600; }
  .th { font-size: 13px; font-weight: 600; }
  .ts { font-size: 11px; font-weight: 400; }
  .label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; }
  .mcp-label { font-size: 11px; font-weight: 500; }
</style>

<rect width="780" height="560" fill="#ffffff" rx="8"/>

<!-- Title -->
<text class="title" x="390" y="30" text-anchor="middle" fill="#333330">Canton Developer Tooling — Complementary Scope</text>

<!-- === THREE CIRCLES === -->

<!-- dpm circle (bottom-left) -->
<circle cx="260" cy="310" r="170" fill="#F1EFE8" fill-opacity="0.7" stroke="#5F5E5A" stroke-width="1.5"/>

<!-- DevKit circle (bottom-right) -->
<circle cx="520" cy="310" r="170" fill="#E6F1FB" fill-opacity="0.7" stroke="#185FA5" stroke-width="1.5"/>

<!-- Cantool circle (top-center) -->
<circle cx="390" cy="210" r="170" fill="#E1F5EE" fill-opacity="0.7" stroke="#0F6E56" stroke-width="1.5"/>

<!-- === "No overlap" markers in intersection zones === -->
<!-- Cantool ∩ dpm -->
<text class="label" x="300" y="222" text-anchor="middle" fill="#888780">no overlap</text>
<!-- Cantool ∩ DevKit -->
<text class="label" x="480" y="222" text-anchor="middle" fill="#888780">no overlap</text>
<!-- dpm ∩ DevKit -->
<text class="label" x="390" y="365" text-anchor="middle" fill="#888780">no overlap</text>
<!-- Center (all three) -->
<text class="label" x="390" y="285" text-anchor="middle" fill="#888780">no overlap</text>

<!-- === CIRCLE LABELS AND CONTENT === -->

<!-- Cantool content (top) -->
<text class="th" x="390" y="85" text-anchor="middle" fill="#085041">Cantool (PR #77)</text>
<text class="ts" x="390" y="102" text-anchor="middle" fill="#0F6E56">Project scaffolding · community templates</text>
<text class="ts" x="390" y="116" text-anchor="middle" fill="#0F6E56">MCP server for AI assistants</text>
<text class="ts" x="390" y="130" text-anchor="middle" fill="#0F6E56">Plugin system (JSON-RPC over stdio)</text>
<text class="ts" x="390" y="144" text-anchor="middle" fill="#0F6E56">Named environments · deployment config</text>
<text class="ts" x="390" y="158" text-anchor="middle" fill="#0F6E56">Auth management · health diagnostics</text>
<text class="ts" x="390" y="176" text-anchor="middle" fill="#085041" font-weight="500">Go single binary · zero dependencies</text>

<!-- dpm content (bottom-left) -->
<text class="th" x="200" y="310" text-anchor="middle" fill="#444441">dpm</text>
<text class="ts" x="200" y="327" text-anchor="middle" fill="#5F5E5A">Daml build · test · codegen</text>
<text class="ts" x="200" y="341" text-anchor="middle" fill="#5F5E5A">SDK version management</text>
<text class="ts" x="200" y="355" text-anchor="middle" fill="#5F5E5A">Sandbox · Daml Studio</text>
<text class="ts" x="200" y="369" text-anchor="middle" fill="#5F5E5A">inspect-dar · clean</text>
<text class="ts" x="200" y="387" text-anchor="middle" fill="#444441" font-weight="500">Requires JDK 17+</text>

<!-- DevKit content (bottom-right) -->
<text class="th" x="580" y="310" text-anchor="middle" fill="#0C447C">DevKit (PR #18)</text>
<text class="ts" x="580" y="327" text-anchor="middle" fill="#185FA5">Splice LocalNet lifecycle</text>
<text class="ts" x="580" y="341" text-anchor="middle" fill="#185FA5">Docker topology · orchestration</text>
<text class="ts" x="580" y="355" text-anchor="middle" fill="#185FA5">Snapshot / restore</text>
<text class="ts" x="580" y="369" text-anchor="middle" fill="#185FA5">Observability · Web UI</text>
<text class="ts" x="580" y="387" text-anchor="middle" fill="#0C447C" font-weight="500">Proposed · not yet funded</text>

<!-- === AI ASSISTANTS (connected via MCP, outside circles) === -->
<rect x="610" y="60" width="150" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="685" y="82" text-anchor="middle" fill="#3C3489">AI Assistants</text>
<text class="ts" x="685" y="96" text-anchor="middle" fill="#534AB7">Claude · Cursor · Copilot</text>

<!-- MCP arrow from Cantool to AI assistants -->
<line x1="530" y1="105" x2="608" y2="90" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow-purple)"/>
<text class="mcp-label" x="560" y="90" text-anchor="middle" fill="#534AB7">MCP</text>

<!-- === PR #105 (small label, extension of dpm) === -->
<rect x="50" y="430" width="180" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="140" y="450" text-anchor="middle" fill="#712B13" font-size="11">dpm DevKit (PR #105)</text>
<text class="ts" x="140" y="464" text-anchor="middle" fill="#993C1D">Deps · lockfiles · tracing</text>

<!-- Arrow from PR #105 to dpm circle -->
<line x1="190" y1="430" x2="225" y2="400" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow-coral)"/>
<text class="label" x="220" y="420" text-anchor="middle" fill="#993C1D">extends dpm</text>

<!-- === Daml Code Assistant (small label) === -->
<rect x="550" y="430" width="180" height="46" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text class="th" x="640" y="450" text-anchor="middle" fill="#72243E" font-size="11">Daml Code Asst. (PR #10)</text>
<text class="ts" x="640" y="464" text-anchor="middle" fill="#993556">AI code completion · funded</text>

<!-- === Canton Runtime (shared foundation, below all) === -->
<rect x="220" y="500" width="340" height="40" rx="8" fill="#F9F9F7" stroke="#D3D1C7" stroke-width="1"/>
<text class="ts" x="390" y="524" text-anchor="middle" fill="#888780" font-weight="500">Canton Runtime — Ledger API · JSON API · PQS · Canton Console</text>

<!-- Arrows from each circle to Canton Runtime -->
<line x1="260" y1="478" x2="310" y2="500" stroke="#5F5E5A" stroke-width="0.75" stroke-dasharray="3 3" marker-end="url(#arrow-gray)"/>
<line x1="390" y1="380" x2="390" y2="500" stroke="#0F6E56" stroke-width="0.75" stroke-dasharray="3 3" marker-end="url(#arrow-green)"/>
<line x1="520" y1="478" x2="470" y2="500" stroke="#185FA5" stroke-width="0.75" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>

<!-- Arrow markers -->
<defs>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
</svg>
