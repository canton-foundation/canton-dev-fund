name: Proposal AI Analysis for dev fund PRs

on:
  pull_request_target:
    types: [labeled]

jobs:
  ai-analysis:
    if: github.event.label.name == 'Core/ready for vote'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Get changed files
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            const proposalFiles = files.data
              .filter(f => f.filename.startsWith('proposals/') && f.filename.endsWith('.md'))
              .map(f => f.filename);
            core.setOutput('files', proposalFiles.join('\n'));

      - name: Analyze proposal for AI signals
        id: analysis
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          if [ -z "$CHANGED_FILES" ]; then
            echo "score=0" >> $GITHUB_OUTPUT
            echo "max_score=0" >> $GITHUB_OUTPUT
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "risk=N/A" >> $GITHUB_OUTPUT
            echo "no_proposal=true" >> $GITHUB_OUTPUT
            echo "" > /tmp/findings.txt
            echo "" > /tmp/info.txt
            exit 0
          fi

          COMBINED=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ -f "$f" ]; then
              COMBINED="${COMBINED}$(cat "$f")"
            fi
          done <<< "$CHANGED_FILES"

          if [ -z "$COMBINED" ]; then
            echo "score=0" >> $GITHUB_OUTPUT
            echo "max_score=0" >> $GITHUB_OUTPUT
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "risk=N/A" >> $GITHUB_OUTPUT
            echo "no_proposal=true" >> $GITHUB_OUTPUT
            echo "" > /tmp/findings.txt
            echo "" > /tmp/info.txt
            exit 0
          fi

          echo "no_proposal=false" >> $GITHUB_OUTPUT
          LINE_COUNT=$(echo "$COMBINED" | wc -l)
          TOTAL_SCORE=0
          MAX_SCORE=0
          FINDINGS=""
          INFO=""

          MAX_SCORE=$((MAX_SCORE + 25))
          TERM_ERRORS=""
          echo "$COMBINED" | grep -qiE 'sub.?net' && TERM_ERRORS="${TERM_ERRORS}, sub-net"
          echo "$COMBINED" | grep -qiE 'loop\s+node' && TERM_ERRORS="${TERM_ERRORS}, Loop node"
          echo "$COMBINED" | grep -qiE 'daml\s+vm' && TERM_ERRORS="${TERM_ERRORS}, Daml VM"
          echo "$COMBINED" | grep -qiE 'canton\s+(identity\s+provider|idp)' && TERM_ERRORS="${TERM_ERRORS}, Canton IdP"
          echo "$COMBINED" | grep -qiE '\bshard(s|ing|ed)\b' && TERM_ERRORS="${TERM_ERRORS}, sharding"
          echo "$COMBINED" | grep -qiE 'canton\s+chain' && TERM_ERRORS="${TERM_ERRORS}, Canton chain"
          echo "$COMBINED" | grep -qiE 'daml\s+evm' && TERM_ERRORS="${TERM_ERRORS}, Daml EVM"
          echo "$COMBINED" | grep -qiE 'canton\s+gas' && TERM_ERRORS="${TERM_ERRORS}, Canton gas"
          TERM_ERRORS=$(echo "$TERM_ERRORS" | sed 's/^, //')
          if [ -n "$TERM_ERRORS" ]; then
            TOTAL_SCORE=$((TOTAL_SCORE + 25))
            FINDINGS="${FINDINGS} Uses made-up ai given Canton terms: ${TERM_ERRORS}\n"
          fi

          MAX_SCORE=$((MAX_SCORE + 20))
          BROKEN_HYPHENS=$(echo "$COMBINED" | grep -cE '(\w-\s|\s-\w|\w-,|\w-\.)' || true)
          if [ "$BROKEN_HYPHENS" -gt 3 ]; then
            TOTAL_SCORE=$((TOTAL_SCORE + 20))
            FINDINGS="${FINDINGS} ${BROKEN_HYPHENS} broken hyphens found (AI artifacts)\n"
          fi

          MAX_SCORE=$((MAX_SCORE + 15))
          EM_DASH_COUNT=$(echo "$COMBINED" | grep -co '—' || true)
          if [ "$EM_DASH_COUNT" -gt 8 ]; then
            TOTAL_SCORE=$((TOTAL_SCORE + 15))
            FINDINGS="${FINDINGS} ${EM_DASH_COUNT} Too many em-dashes found (default AI writing pattern)\n"
          fi

          MAX_SCORE=$((MAX_SCORE + 15))
          SEMICOLON_BULLETS=$(echo "$COMBINED" | grep -cE ';\s*$' || true)
          if [ "$SEMICOLON_BULLETS" -gt 10 ]; then
            TOTAL_SCORE=$((TOTAL_SCORE + 15))
            FINDINGS="${FINDINGS} ${SEMICOLON_BULLETS} bullet points ending with semicolons (AI formatting)\n"
          fi

          MISSING=""
          if ! echo "$COMBINED" | grep -qiE '^#{1,4}\s.*(gtm|go.to.market|adoption|distribution)'; then
            if ! echo "$COMBINED" | grep -qiE '^\*{0,2}(gtm|go.to.market|adoption|distribution)'; then
              MISSING="${MISSING}, GTM/Adoption"
            fi
          fi
          if ! echo "$COMBINED" | grep -qiE '^#{1,4}\s.*(maintenance|post.grant|sustainab)'; then
            if ! echo "$COMBINED" | grep -qiE '^\*{0,2}(maintenance|post.grant|sustainab)'; then
              MISSING="${MISSING}, Maintenance"
            fi
          fi
          if ! echo "$COMBINED" | grep -qiE '^#{1,4}\s.*(acceptance|criteria)'; then
            if ! echo "$COMBINED" | grep -qiE '^\*{0,2}(acceptance|criteria)'; then
              MISSING="${MISSING}, Acceptance Criteria"
            fi
          fi
          MISSING=$(echo "$MISSING" | sed 's/^, //')
          if [ -n "$MISSING" ]; then
            INFO="${INFO}Missing sections: ${MISSING}\n"
          fi
          
          if [ "$MAX_SCORE" -gt 0 ]; then
            PERCENTAGE=$((TOTAL_SCORE * 100 / MAX_SCORE))
          else
            PERCENTAGE=0
          fi

          if [ "$PERCENTAGE" -ge 60 ]; then
            RISK="HIGH"
          elif [ "$PERCENTAGE" -ge 35 ]; then
            RISK="MEDIUM"
          else
            RISK="LOW"
          fi

          echo "score=$TOTAL_SCORE" >> $GITHUB_OUTPUT
          echo "max_score=$MAX_SCORE" >> $GITHUB_OUTPUT
          echo "percentage=$PERCENTAGE" >> $GITHUB_OUTPUT
          echo "risk=$RISK" >> $GITHUB_OUTPUT

          printf '%b' "$FINDINGS" > /tmp/findings.txt
          printf '%b' "$INFO" > /tmp/info.txt

      - name: Send to Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SCORE="${{ steps.analysis.outputs.score }}"
          MAX_SCORE="${{ steps.analysis.outputs.max_score }}"
          PERCENTAGE="${{ steps.analysis.outputs.percentage }}"
          RISK="${{ steps.analysis.outputs.risk }}"
          NO_PROPOSAL="${{ steps.analysis.outputs.no_proposal }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE=$(echo '${{ github.event.pull_request.title }}' | sed 's/"/\\"/g')
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"

          FINDINGS=$(cat /tmp/findings.txt 2>/dev/null | sed 's/"/\\"/g')
          INFO=$(cat /tmp/info.txt 2>/dev/null | sed 's/"/\\"/g')

          if [ "$NO_PROPOSAL" = "true" ]; then
            SCORE_LINE="AI Score: No proposal file found in PR"
          elif [ -z "$(echo "$FINDINGS" | xargs 2>/dev/null)" ]; then
            SCORE_LINE="AI Score: Passed — no AI signals detected"
          else
            SCORE_LINE="AI Risk Level: ${RISK} | Score: ${SCORE}/${MAX_SCORE} (${PERCENTAGE}%)"
          fi

          MSG="Dev Fund AI Analysis (Ready for Vote) — PR #${PR_NUMBER}\n\nProposal: ${PR_TITLE}\nSubmitter: @${PR_AUTHOR}\nLink: ${PR_URL}\n\n${SCORE_LINE}"

          if [ "$NO_PROPOSAL" != "true" ] && [ -n "$(echo "$FINDINGS" | xargs 2>/dev/null)" ]; then
            MSG="${MSG}\n\n${FINDINGS}"
          fi

          if [ -n "$(echo "$INFO" | xargs 2>/dev/null)" ]; then
            MSG="${MSG}\n${INFO}"
          fi

          MSG="${MSG}\nAuto-generated. Pattern matching only."

          PAYLOAD='{"text":"'"$MSG"'","unfurl_links":false}'

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" \
              "$SLACK_WEBHOOK_URL"
          else
            printf '%b' "$MSG"
          fi